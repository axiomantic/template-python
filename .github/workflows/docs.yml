name: Docs
on:
  push:
    branches: [main]
permissions:
  contents: write
  pages: write
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.1.0   # No floating v8 major-tag; pin to specific patch
        with: { enable-cache: true }
      - name: Set up Python
        run: uv python install 3.12
      - name: Install project + docs deps
        # mkdocstrings[python] imports the project to extract docstrings, so the
        # project itself must be installed (editable). `uv sync --all-extras --dev`
        # gets mkdocs-material, mkdocstrings[python], and the project together.
        run: uv sync --all-extras --dev
      - name: Build
        run: uv run mkdocs build --strict
      - name: Deploy to gh-pages
        run: uv run mkdocs gh-deploy --force
